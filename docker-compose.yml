services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: adle_sim
      POSTGRES_USER: adle_user
      POSTGRES_PASSWORD: Password1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ml_service:
    build: ./ml_service
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
